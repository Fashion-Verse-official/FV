<!DOCTYPE html>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #C8BC9E;
    }

    /* BANNER */
    .header img {
        width: 100%;
        display: block;
    }

    /* TOP BUTTONS */
    .buttons {
        display: flex;
        gap: 20px;
        padding: 25px 40px;
        justify-content: center;
    }

    .buttons button {
        padding: 12px 30px;
        border: none;
        border-radius: 30px;
        background: rgba(0,0,0,0.8);
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .buttons button:hover {
        background: black;
        color: white;
        transform: scale(1.05);
    }

    .active-btn {
        background: white !important;
        color: black !important;
    }

    .active-btn:hover {
        background: white !important;
        color: black !important;
    }

    /* SECTION */
    .section {
        display: none;
        padding: 20px 40px 50px;
    }

    .active {
        display: block;
    }

    /* GRID */
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 35px;
    }

    /* CARD */
    .card {
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        transition: 0.3s;
        text-align: center;
        padding-bottom: 15px;
    }

    .card:hover {
        transform: translateY(-8px);
    }

    /* IMAGE */
    .image-box {
        width: 100%;
        aspect-ratio: 3 / 4;
        overflow: hidden;
    }

    .image-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.4s;
    }

    .card:hover img {
        transform: scale(1.05);
    }

    /* BUY ROW */
    .buy-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-top: 12px;
    }

    /* BUY BUTTON */
    .buy-btn {
        padding: 10px 18px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(to right, #000, #333);
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .buy-btn:hover {
        background: black;
        transform: scale(1.08);
    }

    /* STORE LOGO IMAGE */
.amazon-logo {
    width: 44px;
    height: auto;
    object-fit: contain;
}

    width: 66px;
    height: auto;

}

.meesho-logo {

}


</style>

<script>
function showSection(sectionId, btn) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');

    document.querySelectorAll('.buttons button').forEach(b => b.classList.remove('active-btn'));
    btn.classList.add('active-btn');
}
</script>
